<!DOCTYPE html>

<body class="bg-surface text-on-surface min-h-screen pb-32">

<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 p-1 rounded-full">

</div>
<div class="overflow-x-auto no-scrollbar flex space-x-2 mb-4">

<span class="px-3 py-1.5 bg-surface-container-low text-xs font-semibold rounded-full text-on-surface-variant whitespace-nowrap">1년</span>

<div class="flex gap-2">
<div class="flex-1 relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="search">search</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-xl text-sm focus:ring-1 focus:ring-primary" placeholder="검색어 입력" type="text"/>
</div>
<button class="px-3 py-2 bg-surface-container-low rounded-xl flex items-center gap-1 text-sm font-medium">
                    품종 <span class="material-symbols-outlined text-sm" data-icon="expand_more">expand_more</span>

</section>

</div>
</div>
<div class="bg-surface-container-lowest rounded-2xl overflow-hidden shadow-sm relative pt-1">

<p class="text-xs text-on-surface-variant font-medium mb-1">생산량</p>

<span class="text-[10px] text-on-surface-variant">kg</span>
</div>
</div>
</div>

</div>
</div>
</div>
<div class="bg-surface-container-lowest rounded-2xl overflow-hidden shadow-sm relative pt-1">

<span class="text-xl font-bold text-on-surface tracking-tight">42</span>

</div>
</div>
</div>
</section>

</div>

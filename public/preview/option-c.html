<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>시안 C — 레이어드 그레이</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #e2e8f0; }
    .phone { max-width: 390px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; background: #f1f5f9; position: relative; }
    .scrollable { flex: 1; overflow-y: auto; padding-bottom: 96px; padding-top: 44px; background: #f1f5f9; }
    .chip { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
  </style>
</head>
<body>
<div class="phone">

  <!-- ① 상단 레이블 -->
  <div style="background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:6px 0;text-align:center;">
    <span style="color:#64748b;font-size:11px;font-weight:600;letter-spacing:0.08em;">시안 C — 레이어드 그레이 (iOS 스타일)</span>
  </div>

  <!-- ② 헤더 (흰색 + border) -->
  <header style="position:fixed;top:27px;left:0;right:0;max-width:390px;margin:0 auto;height:44px;background:white;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:50;">
    <span style="color:#0f172a;font-weight:700;font-size:15px;letter-spacing:0.04em;">MILL LOG</span>
    <div style="display:flex;gap:10px;align-items:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      <div style="width:28px;height:28px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;">
        <span style="color:#475569;font-size:12px;font-weight:700;">김</span>
      </div>
    </div>
  </header>

  <!-- ③ 컨텐츠 (회색 배경 위 흰 카드) -->
  <div class="scrollable">

    <!-- 필터 카드 (흰 카드) -->
    <div style="background:white;margin:8px 12px;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
      <!-- 탭 -->
      <div style="display:flex;border-bottom:1px solid #f1f5f9;">
        <button style="flex:1;padding:12px 0;font-size:13px;font-weight:700;color:#3b82f6;border-bottom:2px solid #3b82f6;">기간별</button>
        <button style="flex:1;padding:12px 0;font-size:13px;font-weight:500;color:#94a3b8;border-bottom:2px solid transparent;">품종별</button>
        <button style="flex:1;padding:12px 0;font-size:13px;font-weight:500;color:#94a3b8;border-bottom:2px solid transparent;">도정구분별</button>
      </div>
      <!-- 기간 칩 -->
      <div style="padding:10px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;">
        <span class="chip" style="background:#f1f5f9;color:#64748b;">연산</span>
        <span class="chip" style="background:#f1f5f9;color:#64748b;">1년</span>
        <span class="chip" style="background:#3b82f6;color:white;">6개월</span>
        <span class="chip" style="background:#f1f5f9;color:#64748b;">3개월</span>
        <span class="chip" style="background:#f1f5f9;color:#64748b;">1개월</span>
        <span class="chip" style="background:#f1f5f9;color:#64748b;">1주</span>
        <span class="chip" style="background:#f1f5f9;color:#64748b;">📅</span>
      </div>
      <!-- 필터 + 검색 -->
      <div style="padding:0 12px 10px;display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;gap:6px;">
          <button style="display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;background:#eff6ff;color:#3b82f6;font-size:12px;font-weight:600;border:none;">품종 <span style="background:#3b82f6;color:white;border-radius:50%;width:16px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;">2</span> ▾</button>
          <button style="display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;background:#eff6ff;color:#3b82f6;font-size:12px;font-weight:600;border:none;">도정구분 <span style="background:#3b82f6;color:white;border-radius:50%;width:16px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;">1</span> ▾</button>
        </div>
        <div style="display:flex;gap:6px;">
          <input placeholder="생산자명 (쉼표로 구분)" style="flex:1;padding:7px 12px;border-radius:8px;background:#f1f5f9;border:none;font-size:12px;color:#475569;outline:none;" />
          <button style="padding:7px 14px;border-radius:8px;background:#3b82f6;color:white;font-size:12px;font-weight:600;border:none;">검색</button>
          <button style="padding:7px 12px;border-radius:8px;background:#f1f5f9;color:#64748b;font-size:12px;font-weight:600;border:none;">초기화</button>
        </div>
      </div>
      <!-- 적용 칩 -->
      <div style="padding:0 12px 10px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid #f8fafc;padding-top:8px;">
        <span class="tag" style="background:#f1f5f9;color:#64748b;">기간: 6개월</span>
        <span class="tag" style="background:#eff6ff;color:#3b82f6;">품종: 서농22호 ✕</span>
        <span class="tag" style="background:#eff6ff;color:#3b82f6;">품종: 하이아미 ✕</span>
        <span class="tag" style="background:#f5f3ff;color:#7c3aed;">도정: 백미 ✕</span>
      </div>
    </div>

    <!-- 요약 카드 2x2 (흰 카드들) -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 12px 8px;">
      <div style="background:white;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#00a2e8;display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">총 투입량</span></div>
        <div style="text-align:right;"><span style="font-size:22px;font-weight:700;color:#00a2e8;">1,250</span><span style="font-size:11px;font-weight:600;color:#64748b;"> kg</span></div>
      </div>
      <div style="background:white;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#8dc540;display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">총 생산량</span></div>
        <div style="text-align:right;"><span style="font-size:22px;font-weight:700;color:#7db037;">850</span><span style="font-size:11px;font-weight:600;color:#64748b;"> kg</span></div>
      </div>
      <div style="background:white;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#f89c1e;display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">평균 수율</span></div>
        <div style="text-align:right;"><span style="font-size:22px;font-weight:700;color:#cc7b0c;">68.0</span><span style="font-size:11px;font-weight:600;color:#64748b;"> %</span></div>
      </div>
      <div style="background:white;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#94a3b8;display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">도정 건수</span></div>
        <div style="text-align:right;"><span style="font-size:22px;font-weight:700;color:#475569;">12</span><span style="font-size:11px;font-weight:600;color:#64748b;"> 건</span></div>
      </div>
    </div>

    <!-- 차트 카드 -->
    <div style="background:white;margin:0 12px 8px;border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
      <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:12px;">월별 도정 분석</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:100px;justify-content:space-around;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="width:24px;background:#bfdbfe;border-radius:4px 4px 0 0;height:55px;position:relative;"><div style="position:absolute;bottom:0;width:100%;background:#3b82f6;border-radius:4px 4px 0 0;height:38px;"></div></div><span style="font-size:9px;color:#94a3b8;">10월</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="width:24px;background:#bfdbfe;border-radius:4px 4px 0 0;height:70px;position:relative;"><div style="position:absolute;bottom:0;width:100%;background:#3b82f6;border-radius:4px 4px 0 0;height:48px;"></div></div><span style="font-size:9px;color:#94a3b8;">11월</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="width:24px;background:#bbf7d0;border-radius:4px 4px 0 0;height:90px;position:relative;"><div style="position:absolute;bottom:0;width:100%;background:#22c55e;border-radius:4px 4px 0 0;height:62px;"></div></div><span style="font-size:9px;color:#94a3b8;">12월</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="width:24px;background:#bfdbfe;border-radius:4px 4px 0 0;height:60px;position:relative;"><div style="position:absolute;bottom:0;width:100%;background:#3b82f6;border-radius:4px 4px 0 0;height:40px;"></div></div><span style="font-size:9px;color:#94a3b8;">1월</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="width:24px;background:#bfdbfe;border-radius:4px 4px 0 0;height:45px;position:relative;"><div style="position:absolute;bottom:0;width:100%;background:#3b82f6;border-radius:4px 4px 0 0;height:30px;"></div></div><span style="font-size:9px;color:#94a3b8;">2월</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="width:24px;background:#bfdbfe;border-radius:4px 4px 0 0;height:35px;position:relative;"><div style="position:absolute;bottom:0;width:100%;background:#3b82f6;border-radius:4px 4px 0 0;height:24px;"></div></div><span style="font-size:9px;color:#94a3b8;">3월</span></div>
      </div>
    </div>

    <!-- 테이블 카드 -->
    <div style="background:white;margin:0 12px 8px;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow:hidden;">
      <div style="padding:14px 16px 10px;font-size:13px;font-weight:700;color:#1e293b;">세부 도정 실적</div>
      <table style="width:100%;border-collapse:collapse;font-size:11px;">
        <thead><tr style="background:#f8fafc;"><th style="padding:8px 12px;text-align:left;color:#64748b;font-weight:600;">날짜</th><th style="padding:8px 8px;text-align:left;color:#64748b;font-weight:600;">도정구분</th><th style="padding:8px 8px;text-align:right;color:#64748b;font-weight:600;">투입</th><th style="padding:8px 8px;text-align:right;color:#64748b;font-weight:600;">생산</th><th style="padding:8px 12px;text-align:right;color:#64748b;font-weight:600;">수율</th></tr></thead>
        <tbody>
          <tr style="border-top:1px solid #f1f5f9;"><td style="padding:10px 12px;color:#334155;">03-15</td><td style="padding:10px 8px;color:#334155;">백미</td><td style="padding:10px 8px;text-align:right;color:#334155;">500kg</td><td style="padding:10px 8px;text-align:right;color:#334155;">340kg</td><td style="padding:10px 12px;text-align:right;"><span style="background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:9999px;font-weight:700;">68%</span></td></tr>
          <tr style="border-top:1px solid #f1f5f9;"><td style="padding:10px 12px;color:#334155;">03-10</td><td style="padding:10px 8px;color:#334155;">현미</td><td style="padding:10px 8px;text-align:right;color:#334155;">300kg</td><td style="padding:10px 8px;text-align:right;color:#334155;">210kg</td><td style="padding:10px 12px;text-align:right;"><span style="background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:9999px;font-weight:700;">70%</span></td></tr>
          <tr style="border-top:1px solid #f1f5f9;"><td style="padding:10px 12px;color:#334155;">03-05</td><td style="padding:10px 8px;color:#334155;">백미</td><td style="padding:10px 8px;text-align:right;color:#334155;">450kg</td><td style="padding:10px 8px;text-align:right;color:#334155;">300kg</td><td style="padding:10px 12px;text-align:right;"><span style="background:#f1f5f9;color:#64748b;padding:2px 8px;border-radius:9999px;font-weight:700;">67%</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ④ 하단 네비 (흰색 플로팅 필 — 회색 배경 위라 그림자가 더 잘 보임) -->
  <div style="position:fixed;bottom:0;left:0;right:0;max-width:390px;margin:0 auto;padding:0 16px 16px;pointer-events:none;">
    <nav style="background:white;border-radius:20px;height:68px;display:flex;align-items:center;justify-content:space-around;pointer-events:auto;box-shadow:0 8px 32px rgba(15,23,42,0.15);border:1px solid rgba(226,232,240,0.6);">
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;text-decoration:none;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span style="font-size:10px;color:#94a3b8;font-weight:500;">홈</span></a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;text-decoration:none;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span style="font-size:10px;color:#94a3b8;font-weight:500;">재고</span></a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;text-decoration:none;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span style="font-size:10px;color:#94a3b8;font-weight:500;">도정관리</span></a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;text-decoration:none;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg><span style="font-size:10px;color:#94a3b8;font-weight:500;">출고관리</span></a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;text-decoration:none;"><div style="background:#eff6ff;border-radius:12px;padding:4px 10px;display:flex;flex-direction:column;align-items:center;gap:1px;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span style="font-size:10px;color:#3b82f6;font-weight:700;">통계</span></div></a>
    </nav>
  </div>

</div>
</body>
</html>
